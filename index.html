<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Human Ragdoll Physics</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        h1 {
            color: #eee;
            margin-bottom: 10px;
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-align: center;
            padding: 0 10px;
        }
        
        .instructions {
            color: #888;
            margin-bottom: 10px;
            font-size: 0.8rem;
            text-align: center;
            padding: 0 10px;
        }
        
        canvas {
            border: 4px solid #4a4a6a;
            border-radius: 8px;
            background: #16213e;
            cursor: grab;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            max-width: 95vw;
            max-height: 70vh;
        }
        
        canvas:active {
            cursor: grabbing;
        }
    </style>
</head>
<body>
    <h1>Human Ragdoll</h1>
    <p class="instructions">Click and drag any body part to throw the human!</p>
    <canvas id="canvas"></canvas>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Set canvas size based on viewport
        function setCanvasSize() {
            const maxWidth = Math.min(window.innerWidth * 0.95, 800);
            const maxHeight = Math.min(window.innerHeight * 0.7, 600);
            
            // Maintain 4:3 aspect ratio
            let width = maxWidth;
            let height = width * 0.75;
            
            if (height > maxHeight) {
                height = maxHeight;
                width = height / 0.75;
            }
            
            canvas.width = width;
            canvas.height = height;
            
            // Update box boundaries to fit canvas with margin
            BOX.width = canvas.width - 100;
            BOX.height = canvas.height - 100;
            BOX.x = 50;
            BOX.y = 50;
            
            // Scale ragdoll position to fit new canvas
            repositionRagdoll();
        }
        
        // Human-like physics parameters
        const GRAVITY = 0.4;           // Slightly less gravity for floatier feel
        const FRICTION = 0.992;       // More air resistance
        const GROUND_FRICTION = 0.85;  // Friction when on ground
        const BOUNCE = 0.3;            // Less bouncy - human tissue absorbs impact
        const MUSCLE_TENSION = 0.008;  // How much limbs try to return to natural pose
        const HEAD_LAG = 0.15;         // How much head lags behind body
        const CONSTRAINT_ITERATIONS = 8;
        
        // Box boundaries
        const BOX = {
            x: 50,
            y: 50,
            width: 700,
            height: 500
        };
        
        // Scale factor for grabbing radius
        let grabRadius = 50;
        
        // Natural pose angles (relative positions for limbs to try to maintain)
        const naturalPose = {};
        
        // Point class for physics particles - now with mass and muscle memory
        class Point {
            constructor(x, y, radius = 8, mass = 1) {
                this.x = x;
                this.y = y;
                this.oldX = x;
                this.oldY = y;
                this.radius = radius;
                this.mass = mass;
                this.pinned = false;
                this.isHead = false;
                this.isTorso = false;
                this.naturalX = 0;  // Relative to parent/body center
                this.naturalY = 0;
            }
            
            update(centerX, centerY) {
                if (this.pinned) return;
                
                const vx = (this.x - this.oldX) * FRICTION;
                const vy = (this.y - this.oldY) * FRICTION;
                
                this.oldX = this.x;
                this.oldY = this.y;
                
                // Apply gravity (heavier parts fall slightly faster)
                this.x += vx;
                this.y += vy + GRAVITY * (this.mass * 0.5 + 0.5);
                
                // Head lags behind like a real head
                if (this.isHead) {
                    const targetX = centerX + (this.x - centerX) * (1 - HEAD_LAG);
                    const targetY = centerY + (this.y - centerY) * (1 - HEAD_LAG);
                    this.x = this.x * (1 - HEAD_LAG) + targetX * HEAD_LAG;
                    this.y = this.y * (1 - HEAD_LAG) + targetY * HEAD_LAG;
                }
                
                this.constrain();
            }
            
            constrain() {
                // Ground collision with human-like bounce
                const wasInAir = this.y - this.radius > BOX.y + BOX.height - 10;
                
                // Left wall
                if (this.x - this.radius < BOX.x) {
                    this.x = BOX.x + this.radius;
                    this.oldX = this.x + (this.x - this.oldX) * BOUNCE;
                }
                // Right wall
                if (this.x + this.radius > BOX.x + BOX.width) {
                    this.x = BOX.x + BOX.width - this.radius;
                    this.oldX = this.x + (this.x - this.oldX) * BOUNCE;
                }
                // Top wall
                if (this.y - this.radius < BOX.y) {
                    this.y = BOX.y + this.radius;
                    this.oldY = this.y + (this.y - this.oldY) * BOUNCE;
                }
                // Bottom wall (ground)
                if (this.y + this.radius > BOX.y + BOX.height) {
                    this.y = BOX.y + BOX.height - this.radius;
                    // More realistic ground impact
                    if (wasInAir) {
                        // Heavy thud on impact
                        this.oldY = this.y + (this.y - this.oldY) * BOUNCE;
                    } else {
                        // Ground friction
                        this.oldX = this.x - (this.x - this.oldX) * (1 - GROUND_FRICTION);
                    }
                }
            }
        }
        
        // Stick constraint with muscle memory
        class Stick {
            constructor(p1, p2, length = null, isLimb = false) {
                this.p1 = p1;
                this.p2 = p2;
                this.length = length || this.getDistance();
                this.isLimb = isLimb;  // Limbs have more freedom
                this.stiffness = isLimb ? 0.4 : 0.5;  // How rigid the joint is
            }
            
            getDistance() {
                const dx = this.p2.x - this.p1.x;
                const dy = this.p2.y - this.p1.y;
                return Math.sqrt(dx * dx + dy * dy);
            }
            
            update() {
                const dx = this.p2.x - this.p1.x;
                const dy = this.p2.y - this.p1.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance === 0) return;
                
                const difference = this.length - distance;
                const percent = difference / distance * this.stiffness;
                const offsetX = dx * percent;
                const offsetY = dy * percent;
                
                // Mass-based movement (heavier parts move less)
                const totalMass = this.p1.mass + this.p2.mass;
                const p1Ratio = this.p2.mass / totalMass;
                const p2Ratio = this.p1.mass / totalMass;
                
                if (!this.p1.pinned) {
                    this.p1.x -= offsetX * p1Ratio;
                    this.p1.y -= offsetY * p1Ratio;
                }
                if (!this.p2.pinned) {
                    this.p2.x += offsetX * p2Ratio;
                    this.p2.y += offsetY * p2Ratio;
                }
            }
        }
        
        // Create human ragdoll with realistic proportions
        let centerX, centerY;
        
        // Body parts
        let head, neck, chest, belly, pelvis;
        let leftShoulder, leftElbow, leftWrist, leftHand;
        let rightShoulder, rightElbow, rightWrist, rightHand;
        let leftHip, leftKnee, leftAnkle, leftFoot;
        let rightHip, rightKnee, rightAnkle, rightFoot;
        let points = [];
        let sticks = [];
        
        function createRagdoll() {
            centerX = BOX.x + BOX.width / 2;
            centerY = BOX.y + BOX.height / 2;
            
            // Head - smaller, more realistic size
            head = new Point(centerX, centerY - 90, 14, 0.8);
            head.isHead = true;
            neck = new Point(centerX, centerY - 70, 6, 1);
            
            // Torso - heavier, main mass center (chest and belly)
            chest = new Point(centerX, centerY - 50, 8, 3);   // Heavy chest
            chest.isTorso = true;
            belly = new Point(centerX, centerY - 25, 8, 2.5); // Slightly lighter belly
            pelvis = new Point(centerX, centerY, 8, 2);
            
            // Left arm - shoulder to hand (realistic arm length)
            leftShoulder = new Point(centerX - 25, centerY - 55, 5, 1.2);
            leftElbow = new Point(centerX - 45, centerY - 45, 4, 0.8);
            leftWrist = new Point(centerX - 60, centerY - 35, 3, 0.5);
            leftHand = new Point(centerX - 72, centerY - 28, 5, 0.4);
            
            // Right arm
            rightShoulder = new Point(centerX + 25, centerY - 55, 5, 1.2);
            rightElbow = new Point(centerX + 45, centerY - 45, 4, 0.8);
            rightWrist = new Point(centerX + 60, centerY - 35, 3, 0.5);
            rightHand = new Point(centerX + 72, centerY - 28, 5, 0.4);
            
            // Left leg - hip to foot (realistic leg length)
            leftHip = new Point(centerX - 12, centerY + 10, 5, 1.5);
            leftKnee = new Point(centerX - 14, centerY + 50, 4, 1);
            leftAnkle = new Point(centerX - 15, centerY + 90, 3, 0.8);
            leftFoot = new Point(centerX - 18, centerY + 125, 6, 1);
            
            // Right leg
            rightHip = new Point(centerX + 12, centerY + 10, 5, 1.5);
            rightKnee = new Point(centerX + 14, centerY + 50, 4, 1);
            rightAnkle = new Point(centerX + 15, centerY + 90, 3, 0.8);
            rightFoot = new Point(centerX + 18, centerY + 125, 6, 1);
            
            points = [
                head, neck, chest, belly, pelvis,
                leftShoulder, leftElbow, leftWrist, leftHand,
                rightShoulder, rightElbow, rightWrist, rightHand,
                leftHip, leftKnee, leftAnkle, leftFoot,
                rightHip, rightKnee, rightAnkle, rightFoot
            ];
            
            // Store natural positions relative to body center
            for (const p of points) {
                p.naturalX = p.x - centerX;
                p.naturalY = p.y - centerY;
            }
            
            // Create sticks (constraints)
            sticks = [
                // Head and neck
                new Stick(head, neck),
                new Stick(neck, chest),
                new Stick(chest, belly),
                new Stick(belly, pelvis),
                
                // Left arm - looser joints for more natural movement
                new Stick(neck, leftShoulder, null, true),
                new Stick(leftShoulder, leftElbow, null, true),
                new Stick(leftElbow, leftWrist, null, true),
                new Stick(leftWrist, leftHand, null, true),
                
                // Right arm
                new Stick(neck, rightShoulder, null, true),
                new Stick(rightShoulder, rightElbow, null, true),
                new Stick(rightElbow, rightWrist, null, true),
                new Stick(rightWrist, rightHand, null, true),
                
                // Left leg
                new Stick(pelvis, leftHip, null, true),
                new Stick(leftHip, leftKnee, null, true),
                new Stick(leftKnee, leftAnkle, null, true),
                new Stick(leftAnkle, leftFoot, null, true),
                
                // Right leg
                new Stick(pelvis, rightHip, null, true),
                new Stick(rightHip, rightKnee, null, true),
                new Stick(rightKnee, rightAnkle, null, true),
                new Stick(rightAnkle, rightFoot, null, true),
                
                // Structural constraints (keep body connected)
                new Stick(head, chest),        // Head to chest
                new Stick(leftShoulder, rightShoulder), // Shoulder width
                new Stick(leftHip, rightHip),  // Hip width
                new Stick(leftShoulder, chest),
                new Stick(rightShoulder, chest),
                new Stick(leftHip, pelvis),
                new Stick(rightHip, pelvis),
                new Stick(leftShoulder, leftHip),  // Body side
                new Stick(rightShoulder, rightHip),
                
                // Extra stability
                new Stick(chest, leftHip),
                new Stick(chest, rightHip),
                new Stick(belly, leftHip),
                new Stick(belly, rightHip),
            ];
        }
        
        function repositionRagdoll() {
            if (points.length === 0) return;
            
            // Store old center
            const oldCenterX = belly.x;
            const oldCenterY = belly.y;
            
            // Recalculate new center
            const newCenterX = BOX.x + BOX.width / 2;
            const newCenterY = BOX.y + BOX.height / 2;
            
            // Offset to move ragdoll to new center
            const offsetX = newCenterX - oldCenterX;
            const offsetY = newCenterY - oldCenterY;
            
            // Update all point positions
            for (const point of points) {
                point.x += offsetX;
                point.y += offsetY;
                point.oldX += offsetX;
                point.oldY += offsetY;
            }
        }
        
        // Mouse interaction
        let draggedPoint = null;
        let mouseX = 0;
        let mouseY = 0;
        
        function getPointerPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            if (e.touches) {
                return {
                    x: (e.touches[0].clientX - rect.left) * scaleX,
                    y: (e.touches[0].clientY - rect.top) * scaleY
                };
            }
            return {
                x: (e.clientX - rect.left) * scaleX,
                y: (e.clientY - rect.top) * scaleY
            };
        }
        
        function findClosestPoint(x, y) {
            let closest = null;
            let closestDist = grabRadius;
            
            for (const point of points) {
                const dx = point.x - x;
                const dy = point.y - y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < closestDist) {
                    closestDist = dist;
                    closest = point;
                }
            }
            
            return closest;
        }
        
        // Mouse events
        canvas.addEventListener('mousedown', (e) => {
            const pos = getPointerPos(e);
            mouseX = pos.x;
            mouseY = pos.y;
            
            const closest = findClosestPoint(mouseX, mouseY);
            
            if (closest) {
                draggedPoint = closest;
                draggedPoint.pinned = true;
            }
        });
        
        canvas.addEventListener('mousemove', (e) => {
            const pos = getPointerPos(e);
            mouseX = pos.x;
            mouseY = pos.y;
            
            if (draggedPoint) {
                draggedPoint.x = mouseX;
                draggedPoint.y = mouseY;
            }
        });
        
        canvas.addEventListener('mouseup', () => {
            if (draggedPoint) {
                draggedPoint.pinned = false;
                // Apply throwing velocity with human-like weight
                const throwMultiplier = draggedPoint.mass * 1.5;
                draggedPoint.oldX = draggedPoint.x - (mouseX - lastMouseX) * throwMultiplier;
                draggedPoint.oldY = draggedPoint.y - (mouseY - lastMouseY) * throwMultiplier;
                draggedPoint = null;
            }
        });
        
        canvas.addEventListener('mouseleave', () => {
            if (draggedPoint) {
                draggedPoint.pinned = false;
                draggedPoint = null;
            }
        });
        
        // Touch events
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const pos = getPointerPos(e);
            mouseX = pos.x;
            mouseY = pos.y;
            
            const closest = findClosestPoint(mouseX, mouseY);
            
            if (closest) {
                draggedPoint = closest;
                draggedPoint.pinned = true;
            }
        }, { passive: false });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const pos = getPointerPos(e);
            mouseX = pos.x;
            mouseY = pos.y;
            
            if (draggedPoint) {
                draggedPoint.x = mouseX;
                draggedPoint.y = mouseY;
            }
        }, { passive: false });
        
        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            if (draggedPoint) {
                draggedPoint.pinned = false;
                const throwMultiplier = draggedPoint.mass * 1.5;
                draggedPoint.oldX = draggedPoint.x - (mouseX - lastMouseX) * throwMultiplier;
                draggedPoint.oldY = draggedPoint.y - (mouseY - lastMouseY) * throwMultiplier;
                draggedPoint = null;
            }
        }, { passive: false });
        
        canvas.addEventListener('touchcancel', (e) => {
            e.preventDefault();
            if (draggedPoint) {
                draggedPoint.pinned = false;
                draggedPoint = null;
            }
        }, { passive: false });
        
        let lastMouseX = 0;
        let lastMouseY = 0;
        
        // Track mouse velocity
        setInterval(() => {
            lastMouseX = mouseX;
            lastMouseY = mouseY;
        }, 16);
        
        // Draw functions
        function drawBox() {
            ctx.strokeStyle = '#4a4a6a';
            ctx.lineWidth = 4;
            ctx.strokeRect(BOX.x, BOX.y, BOX.width, BOX.height);
            
            // Draw corner accents
            ctx.fillStyle = '#6a6a8a';
            const cornerSize = 15;
            // Top-left
            ctx.fillRect(BOX.x - 2, BOX.y - 2, cornerSize, 4);
            ctx.fillRect(BOX.x - 2, BOX.y - 2, 4, cornerSize);
            // Top-right
            ctx.fillRect(BOX.x + BOX.width - cornerSize + 2, BOX.y - 2, cornerSize, 4);
            ctx.fillRect(BOX.x + BOX.width - 2, BOX.y - 2, 4, cornerSize);
            // Bottom-left
            ctx.fillRect(BOX.x - 2, BOX.y + BOX.height - 2, cornerSize, 4);
            ctx.fillRect(BOX.x - 2, BOX.y + BOX.height - cornerSize + 2, 4, cornerSize);
            // Bottom-right
            ctx.fillRect(BOX.x + BOX.width - cornerSize + 2, BOX.y + BOX.height - 2, cornerSize, 4);
            ctx.fillRect(BOX.x + BOX.width - 2, BOX.y + BOX.height - cornerSize + 2, 4, cornerSize);
            
            // Draw floor texture
            ctx.fillStyle = '#2a2a4a';
            ctx.fillRect(BOX.x, BOX.y + BOX.height - 3, BOX.width, 3);
        }
        
        function drawHuman() {
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            // Draw body outline (thicker for torso)
            ctx.strokeStyle = '#ddd';
            ctx.lineWidth = 10;
            
            // Torso line
            ctx.beginPath();
            ctx.moveTo(chest.x, chest.y);
            ctx.lineTo(belly.x, belly.y);
            ctx.lineTo(pelvis.x, pelvis.y);
            ctx.stroke();
            
            // Draw limbs (arms and legs)
            ctx.lineWidth = 7;
            ctx.strokeStyle = '#ccc';
            
            // Left arm
            ctx.beginPath();
            ctx.moveTo(leftShoulder.x, leftShoulder.y);
            ctx.lineTo(leftElbow.x, leftElbow.y);
            ctx.lineTo(leftWrist.x, leftWrist.y);
            ctx.lineTo(leftHand.x, leftHand.y);
            ctx.stroke();
            
            // Right arm
            ctx.beginPath();
            ctx.moveTo(rightShoulder.x, rightShoulder.y);
            ctx.lineTo(rightElbow.x, rightElbow.y);
            ctx.lineTo(rightWrist.x, rightWrist.y);
            ctx.lineTo(rightHand.x, rightHand.y);
            ctx.stroke();
            
            // Left leg
            ctx.beginPath();
            ctx.moveTo(leftHip.x, leftHip.y);
            ctx.lineTo(leftKnee.x, leftKnee.y);
            ctx.lineTo(leftAnkle.x, leftAnkle.y);
            ctx.lineTo(leftFoot.x, leftFoot.y);
            ctx.stroke();
            
            // Right leg
            ctx.beginPath();
            ctx.moveTo(rightHip.x, rightHip.y);
            ctx.lineTo(rightKnee.x, rightKnee.y);
            ctx.lineTo(rightAnkle.x, rightAnkle.y);
            ctx.lineTo(rightFoot.x, rightFoot.y);
            ctx.stroke();
            
            // Draw shoulders
            ctx.lineWidth = 12;
            ctx.beginPath();
            ctx.moveTo(leftShoulder.x, leftShoulder.y);
            ctx.lineTo(rightShoulder.x, rightShoulder.y);
            ctx.stroke();
            
            // Draw hips
            ctx.beginPath();
            ctx.moveTo(leftHip.x, leftHip.y);
            ctx.lineTo(rightHip.x, rightHip.y);
            ctx.stroke();
            
            // Draw head (more realistic - oval shape)
            ctx.fillStyle = '#e8c4a0';  // Skin tone
            ctx.beginPath();
            ctx.ellipse(head.x, head.y, 16, 20, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Hair
            ctx.fillStyle = '#4a3728';
            ctx.beginPath();
            ctx.ellipse(head.x, head.y - 5, 14, 12, 0, Math.PI, Math.PI * 2);
            ctx.fill();
            
            // Eyes (direction based on velocity)
            const vx = head.x - head.oldX;
            const vy = head.y - head.oldY;
            const eyeOffsetX = vx * 2;
            const eyeOffsetY = vy * 2;
            
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.arc(head.x - 5 + eyeOffsetX, head.y - 2 + eyeOffsetY, 2.5, 0, Math.PI * 2);
            ctx.arc(head.x + 5 + eyeOffsetX, head.y - 2 + eyeOffsetY, 2.5, 0, Math.PI * 2);
            ctx.fill();
            
            // Draw hands and feet (flesh colored)
            ctx.fillStyle = '#e8c4a0';
            
            // Hands
            ctx.beginPath();
            ctx.arc(leftHand.x, leftHand.y, 6, 0, Math.PI * 2);
            ctx.arc(rightHand.x, rightHand.y, 6, 0, Math.PI * 2);
            ctx.fill();
            
            // Feet
            ctx.fillStyle = '#555';
            ctx.beginPath();
            ctx.ellipse(leftFoot.x, leftFoot.y, 8, 4, 0, 0, Math.PI * 2);
            ctx.ellipse(rightFoot.x, rightFoot.y, 8, 4, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Draw joints (elbows, knees) as subtle dots
            ctx.fillStyle = '#999';
            ctx.beginPath();
            ctx.arc(leftElbow.x, leftElbow.y, 2, 0, Math.PI * 2);
            ctx.arc(rightElbow.x, rightElbow.y, 2, 0, Math.PI * 2);
            ctx.arc(leftKnee.x, leftKnee.y, 2, 0, Math.PI * 2);
            ctx.arc(rightKnee.x, rightKnee.y, 2, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function getBodyCenter() {
            // Calculate center of mass
            let totalMass = 0;
            let sumX = 0;
            let sumY = 0;
            
            for (const point of points) {
                sumX += point.x * point.mass;
                sumY += point.y * point.mass;
                totalMass += point.mass;
            }
            
            return {
                x: sumX / totalMass,
                y: sumY / totalMass
            };
        }
        
        function update() {
            const center = getBodyCenter();
            
            // Update physics
            for (const point of points) {
                point.update(center.x, center.y);
            }
            
            // Solve constraints multiple times for stability
            for (let i = 0; i < CONSTRAINT_ITERATIONS; i++) {
                for (const stick of sticks) {
                    stick.update();
                }
                // Re-constrain points after stick updates
                for (const point of points) {
                    point.constrain();
                }
            }
        }
        
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBox();
            drawHuman();
        }
        
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        
        // Initialize
        setCanvasSize();
        createRagdoll();
        
        // Handle window resize
        window.addEventListener('resize', () => {
            setCanvasSize();
        });
        
        // Start the simulation
        loop();
    </script>
</body>
</html>
